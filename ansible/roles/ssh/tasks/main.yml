---
- name: Allow cloudinit root user
  ansible.builtin.lineinfile:
    path: /etc/cloud/cloud.cfg
    regexp: "^disable_root: true"
    line: "disable_root: false"
  failed_when: false

- name: Create sysmaster group
  ansible.builtin.group:
    name: sysmaster
    state: present

- name: Ensure sudo package is installed
  ansible.builtin.package:
    name: sudo
    state: present

- name: Add sysmaster to root without passwd
  ansible.builtin.blockinfile:
    path: /etc/sudoers.d/sysmaster
    append_newline: true
    prepend_newline: true
    create: true
    validate: "visudo -cf %s"
    block: |
      sysmaster ALL=(ALL) NOPASSWD:ALL
      %sysmaster ALL=(ALL) NOPASSWD:ALL
    mode: '0440'

- name: Create master user
  ansible.builtin.user:
    name: "{{ ssh_master_user }}"
    comment: Ansible managed. DO NOT modify them manually"
    create_home: true
    shell: /bin/bash
    groups: sysmaster
    append: true

- name: Add group permission (OpenSUSE)
  ansible.builtin.command: "groupadd {{ ssh_master_user }}"
  register: add_group_suse
  changed_when: add_group_suse.rc != 0
  when: ansible_facts['distribution'] in ['openSUSE Leap', 'openSUSE Tumbleweed']

- name: Create ssh directory
  ansible.builtin.file:
    path: "{{ ssh_authkey_path }}"
    state: directory
    mode: '0755'

- name: Copy authorized file
  ansible.builtin.template:
    src: "authorized_keys.j2"
    dest: "{{ ssh_authkey_path }}/authorized_keys"
    owner: "{{ ssh_master_user }}"
    group: "{{ ssh_master_user }}"
    mode: "600"
    backup: true

- name: add .pub files in ssh_authkey_path to authorized_keys
  ansible.builtin.find:
    paths: "{{ ssh_authkey_path }}"
    patterns: "*.pub"
    file_type: file
  register: pub_files

- name: Add public keys to authorized_keys
  ansible.builtin.lineinfile:
    path: "{{ ssh_authkey_path }}/authorized_keys"
    line: "{{ item }}"
    insertafter: "^# Add public keys here"
  loop: "{{ pub_files.files | map(attribute='path') | list }}"
  when: pub_files.matched > 0

- name: Copy ssh configuration file
  ansible.builtin.template:
    src: "ssh_config.j2"
    dest: "/etc/ssh/ssh_config.d/homelab.conf"
    owner: "{{ ssh_master_user }}"
    group: "{{ ssh_master_user }}"
    mode: "600"
    backup: true

- name: Decrease MaxAuthTries
  ansible.builtin.lineinfile:
    path: "/etc/ssh/sshd_config"
    insertafter: "^#MaxAuthTries 6"
    line: "MaxAuthTries 3"
  when: ssh_hardening

- name: Enforce use of protocol 2
  ansible.builtin.lineinfile:
    path: "/etc/ssh/sshd_config"
    insertafter: "^Include /etc/ssh/sshd_config.d/*.conf"
    line: "Protocol 2"
  when: ssh_hardening
