version: "3.9"
services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - PUID=0
      - PGID=0
      - TZ=Indian/Mauritius
    volumes:
      - ./config:/config
    ports:
      - 8191:8191
    restart: unless-stopped