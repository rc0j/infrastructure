version: '3.8'

services:
  app:
    image: docker.io/jc21/nginx-proxy-manager:2.15.1
    restart: unless-stopped
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 81
        published: 81
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
    volumes:
      # Using absolute paths to map your existing local configuration data
      - /opt/nginx-proxy-manager/docker-node01-stack/nginx/data:/data
      - /opt/nginx-proxy-manager/docker-node01-stack/nginx/letsencrypt:/etc/letsencrypt
    networks:
      - swarm-ingress-bridge
    deploy:
      placement:
        constraints:
          # Forces this service to only run on the proxy node where the data lives
          - node.hostname == VLNODE01

networks:
  swarm-ingress-bridge:
    external: true