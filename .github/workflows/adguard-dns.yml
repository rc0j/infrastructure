name: adguard_dns_update

"on":
  push:
    branches:
      - main
    paths:
      - 'terraform/prod/services/AdGuard/adguard-dns/**/*'

jobs:
  plan_adguard_dns:
    name: tf_plan
    runs-on: self-hosted
    container:
      image: hashicorp/terraform:latest
      volumes:
        - /var/local/terraform-state:/opt/terraform-state:rw

    env:
      TF_DIR: "terraform/prod/services/AdGuard/adguard-dns"
      TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform Init
        run: |
          cd ${{ env.TF_DIR }}
          terraform init -input=false

      - name: Terraform Plan
        run: |
          cd ${{ env.TF_DIR }}
          terraform plan -refresh-only -detailed-exitcode || DRIFT_EXIT_CODE=$?
          terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dns
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  apply_adguard_dns:
    name: tf_apply
    needs: plan_adguard_dns
    runs-on: self-hosted
    container:
      image: hashicorp/terraform:latest
      volumes:
        - /var/local/terraform-state:/opt/terraform-state:rw
    env:
      TF_DIR: "terraform/prod/services/AdGuard/adguard-dns"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dns
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        run: |
          cd ${{ env.TF_DIR }}
          terraform init -input=false
          terraform apply -input=false tfplan
